stages:
  - plan
  - apply

variables:
  TF_VERSION: "1.14.5"

.terraform_base:
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  tags:
    - terraform
  before_script:
    - cd ${TF_ROOT}
    - terraform init -input=false

# =============================================================================
# dev 계정 - Lambda, EventBridge
# =============================================================================
dev:plan:
  extends: .terraform_base
  stage: plan
  variables:
    TF_ROOT: terraform/account/dev
  script:
    - terraform plan -var-file=environments/dev.tfvars -out=tfplan
  artifacts:
    paths:
      - ${TF_ROOT}/tfplan
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - terraform/account/dev/**/*
        - terraform/modules/lambda/**/*
        - terraform/modules/eventbridge/**/*
    - when: manual
      allow_failure: true

dev:apply:
  extends: .terraform_base
  stage: apply
  resource_group: dev-economic-reporter
  variables:
    TF_ROOT: terraform/account/dev
  script:
    - terraform apply -auto-approve tfplan
  dependencies:
    - dev:plan
  rules:
    - when: manual
      allow_failure: true

# =============================================================================
# shared 계정 - Authorizer Lambda, Secrets Manager, API Gateway
# =============================================================================
shared:plan:
  extends: .terraform_base
  stage: plan
  variables:
    TF_ROOT: terraform/account/shared
  script:
    - terraform plan -var-file=environments/shared.tfvars -out=tfplan
  artifacts:
    paths:
      - ${TF_ROOT}/tfplan
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - terraform/account/shared/**/*
        - terraform/modules/authorizer/**/*
        - terraform/modules/apigateway/**/*
    - when: manual
      allow_failure: true

shared:apply:
  extends: .terraform_base
  stage: apply
  resource_group: shared-economic-reporter
  variables:
    TF_ROOT: terraform/account/shared
  script:
    - terraform apply -auto-approve tfplan
  dependencies:
    - shared:plan
  rules:
    - when: manual
      allow_failure: true
